version: '3.8'

services:
  # Backend API Service
  backend:
    build: ./server
    container_name: finance-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
  - NODE_ENV=production
  - PORT=5000
  - SUPABASE_URL=${SUPABASE_URL}
  - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
  - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      
    networks:
      - finance-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Service
  frontend:
    build: ./client
    container_name: finance-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - finance-network

networks:
  finance-network:
    driver: bridge
