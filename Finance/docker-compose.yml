version: '3.8'

services:
  # Backend API Service
  backend:
    build: ./server
    container_name: finance-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - SUPABASE_URL=${https://tzbopjxklzrlhlaxdyxu.supabase.co}
      - SUPABASE_SERVICE_ROLE_KEY=${eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6Ym9wanhrbHpybGhsYXhkeXh1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDU3NzAzNSwiZXhwIjoyMDk2MTUzMDM1fQ.h7EXqfG9XuVMxDX84ognsURzuJEXA3yiWOs3XFULshc}
      - SUPABASE_ANON_KEY=${sb_publishable_k6VMsI0UWwANwv0WDbT_6w_pV9SXVV3sb_publishable_k6VMsI0UWwANwv0WDbT_6w_pV9SXVV3}
      
    networks:
      - finance-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Service
  frontend:
    build: ./client
    container_name: finance-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - finance-network

networks:
  finance-network:
    driver: bridge