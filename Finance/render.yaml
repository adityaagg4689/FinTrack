# render.yaml
services:
  # Backend API Service
  - type: web
    name: finance-tracker-api
    runtime: node
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO_NAME
    branch: main
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLAUDE_API_KEY
        sync: false

  # Frontend Static Site
  - type: static
    name: finance-tracker-web
    runtime: static
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO_NAME
    branch: main
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: ./client/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://finance-tracker-api.onrender.com/api